<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Horas Extras</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Variables de tema ─────────────────────────────── */
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --accent: #3b82f6;
      --accent2: #1d4ed8;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --card: #1e293b;
      --hover: #334155;
      --selected: #1d3a6b;
      --selected-border: #3b82f6;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --bg2: #ffffff;
      --bg3: #e2e8f0;
      --border: #cbd5e1;
      --text: #0f172a;
      --text2: #64748b;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --success: #16a34a;
      --error: #dc2626;
      --warning: #d97706;
      --card: #ffffff;
      --hover: #e2e8f0;
      --selected: #dbeafe;
      --selected-border: #2563eb;
      --shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    /* ── Reset y base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Barra superior ────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .topbar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .topbar-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .ctrl-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 34px;
      height: 34px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:active { background: var(--border); }

    /* ── Pantallas ─────────────────────────────────────── */
    .screen {
      display: none;
      padding-top: 68px;
      padding-bottom: 24px;
      min-height: 100vh;
    }

    .screen.active { display: block; }

    /* ── Login ─────────────────────────────────────────── */
    #screenLogin {
      display: none;
      align-items: center;
      justify-content: center;
    }

    #screenLogin.active {
      display: flex;
      flex-direction: column;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 100%;
      max-width: 380px;
      margin: 0 16px;
      box-shadow: var(--shadow);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-logo span {
      font-size: 2.5rem;
    }

    .login-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text2);
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text2); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    .btn-danger {
      background: var(--error);
      color: #fff;
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .hidden { display: none !important; }

    .divider {
      text-align: center;
      color: var(--text2);
      font-size: 0.8rem;
      margin: 16px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    /* ── Registro ──────────────────────────────────────── */
    .page-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 52px;
      z-index: 90;
    }

    .page-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .area-badge {
      background: var(--accent);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.875rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .btn-icon:active { background: var(--border); }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.9rem;
      outline: none;
      -webkit-appearance: none;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text2); }

    .contador-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    /* ── Lista personal ────────────────────────────────── */
    .lista-container {
      padding: 8px 12px;
    }

    .persona-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .persona-item:active { background: var(--hover); }

    .persona-item.seleccionado {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .persona-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .persona-nombre {
      font-weight: 700;
      font-size: 1rem;
    }

    .persona-cargo {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .persona-horas {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-horas {
      width: 64px;
      background: var(--bg3);
      border: 1px solid var(--selected-border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
    }

    .check-icon {
      color: var(--success);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .plus-icon {
      color: var(--text2);
      font-size: 1.4rem;
      width: 28px;
      text-align: center;
    }

    /* ── Footer registro ───────────────────────────────── */
    .registro-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 90;
    }

    .footer-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .footer-inputs .form-input {
      font-size: 0.9rem;
      padding: 10px 12px;
    }

    .input-fecha {
      flex: 0 0 140px;
    }

    .input-motivo {
      flex: 1;
    }

    /* ── Reportes ──────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 90;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      flex: 1;
      min-width: 70px;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .reporte-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .reporte-acciones {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .resumen-cards {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .resumen-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      min-width: 110px;
      text-align: center;
      flex-shrink: 0;
    }

    .resumen-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .resumen-valor {
      display: block;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
    }

    .reporte-body {
      padding: 0 12px 120px;
    }

    .reporte-area {
      margin-bottom: 16px;
    }

    .reporte-area-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg3);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .reporte-area-nombre {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .reporte-area-total {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.9rem;
    }

    .tabla {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
    }

    .tabla th {
      background: var(--bg2);
      color: var(--text2);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .tabla td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .tabla tr:last-child td { border-bottom: none; }
    .tabla tr:nth-child(even) td { background: var(--bg); }

    .horas-cell {
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .motivo-cell {
      color: var(--text2);
      font-size: 0.8rem;
    }

    .rank-num {
      font-weight: 800;
      color: var(--warning);
      text-align: center;
    }

    .ranking-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      padding: 16px 0 10px;
      color: var(--text2);
    }

    .empty-msg {
      text-align: center;
      color: var(--text2);
      padding: 40px 20px;
      font-size: 0.95rem;
    }

    .loading-msg {
      text-align: center;
      color: var(--text2);
      padding: 30px;
      font-size: 0.9rem;
    }

    /* ── Toast ─────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 999;
      animation: fadeInUp 0.2s ease, fadeOut 0.3s ease 2.7s forwards;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .toast-ok { background: var(--success); color: #fff; }
    .toast-error { background: var(--error); color: #fff; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    /* ── Espaciado footer ──────────────────────────────── */
    .screen-registro-content {
      padding-bottom: 160px;
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (min-width: 600px) {
      .login-box { max-width: 420px; }
      .lista-container { max-width: 600px; margin: 0 auto; }
      .reporte-body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<!-- ── Barra superior ─────────────────────────────────────── -->
<div class="topbar">
  <span class="topbar-title">⏱ Horas Extras</span>
  <div class="topbar-controls">
    <button class="ctrl-btn" id="btnFontDown" title="Reducir texto">A-</button>
    <button class="ctrl-btn" id="btnFontUp" title="Aumentar texto">A+</button>
    <button class="ctrl-btn" id="btnTheme" title="Cambiar tema">☀️</button>
  </div>
</div>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div class="screen active" id="screenLogin">
  <div class="login-box">
    <div class="login-logo"><span>🏭</span></div>
    <h1 class="login-title">Horas Extras</h1>
    <p class="login-subtitle">Sistema de registro</p>

    <div id="loginNormal">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="inputUsuario" type="text"
          placeholder="supervisora.corte" autocomplete="username" autocapitalize="none">
      </div>
      <div class="form-group">
        <label class="form-label">PIN</label>
        <input class="form-input" id="inputPin" type="password"
          placeholder="••••" inputmode="numeric" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btnLogin">Ingresar</button>
      <div class="divider">o</div>
      <button class="btn btn-secondary" id="btnModoLector">Entrar como lector</button>
    </div>

    <div id="loginLector" class="hidden">
      <div class="form-group">
        <label class="form-label">PIN de acceso</label>
        <input class="form-input" id="inputPinLector" type="password"
          placeholder="••••" inputmode="numeric">
      </div>
      <button class="btn btn-primary" id="btnLoginLector">Ver reportes</button>
      <button class="btn btn-secondary" id="btnModoLector2" onclick="
        document.getElementById('loginNormal').classList.remove('hidden');
        document.getElementById('loginLector').classList.add('hidden');
      ">← Volver</button>
    </div>
  </div>
</div>

<!-- ── REGISTRO ───────────────────────────────────────────── -->
<div class="screen" id="screenRegistro">
  <div class="page-header">
    <div class="page-header-top">
      <span class="area-badge" id="labelArea">Área</span>
      <div class="header-actions">
        <button class="btn-icon" id="btnSeleccionarTodos">Sel. todos</button>
        <button class="btn-icon" id="btnVerReporte">📊 Reportes</button>
        <button class="btn-icon" id="btnLogoutRegistro">Salir</button>
      </div>
    </div>
    <div class="search-row">
      <input class="search-input" id="inputBusqueda" type="search"
        placeholder="Buscar persona..." autocomplete="off">
      <div class="contador-badge">
        <span id="contadorSeleccionados">0</span> sel.
      </div>
    </div>
  </div>

  <div class="screen-registro-content">
    <div class="lista-container" id="listaPersonal"></div>
  </div>

  <div class="registro-footer">
    <div class="footer-inputs">
      <input class="form-input input-fecha" id="inputFecha" type="date">
      <input class="form-input input-motivo" id="inputMotivo"
        type="text" placeholder="Motivo de horas extras">
    </div>
    <button class="btn btn-success" id="btnGuardar">Guardar registro</button>
  </div>
</div>

<!-- ── REPORTES ───────────────────────────────────────────── -->
<div class="screen" id="screenReportes">
  <div class="tabs">
    <button class="tab-btn active" id="tab-dia">Día</button>
    <button class="tab-btn" id="tab-semana">Semana</button>
    <button class="tab-btn" id="tab-quincena">Quincena</button>
    <button class="tab-btn" id="tab-mes">Mes</button>
  </div>

  <div class="reporte-header">
    <input class="form-input" id="inputFechaReporte" type="date" style="max-width:160px">
    <div class="reporte-acciones">
      <button class="btn-icon" id="btnVolverRegistro">← Volver</button>
      <button class="btn-icon" id="btnLogoutReporte">Salir</button>
    </div>
  </div>

  <div class="resumen-cards" id="resumenReporte"></div>

  <p class="loading-msg" id="loadingReporte" style="display:none">Cargando...</p>

  <div class="reporte-body">
    <div id="tablaReporte"></div>
    <div id="rankingReporte"></div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
